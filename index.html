<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI英単語照合スキャナー</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #status { background: #eee; padding: 10px; border-radius: 5px; margin: 10px 0; font-size: 0.9rem; }
        .word-card { border-left: 5px solid #3498db; background: #f9f9f9; padding: 10px; margin: 5px 0; display: flex; justify-content: space-between; }
        .en { font-weight: bold; color: #2980b9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI単語スキャナー</h1>
        <input type="file" id="upload" accept="image/*">
        <div id="status">準備完了（写真をアップしてね）</div>
        <div id="result"></div>
    </div>

    <script>
        const fileInput = document.getElementById('upload');
        const status = document.getElementById('status');
        const resultDiv = document.getElementById('result');

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.innerText = "1/2: QRコードを解析中...";
            resultDiv.innerHTML = "";

            const reader = new FileReader();
            reader.onload = async (event) => {
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width; canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);

                    // 1. QRコード検出
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height);

                    if (code) {
                        status.innerText = "2/2: 文字を認識中（少し時間がかかります）...";
                        
                        // 2. OCR実行 (英語のみ認識させる)
                        const { data: { text } } = await Tesseract.recognize(img, 'eng');
                        const detectedText = text.toLowerCase();

                        // 3. JSON読み込みと照合
                        matchAndDisplay(code.data, detectedText);
                    } else {
                        status.innerText = "❌ QRコードが見つかりません。";
                    }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        async function matchAndDisplay(url, detectedText) {
            try {
                const response = await fetch('words.json');
                const wordDatabase = await response.json();
                const wordList = wordDatabase[url];

                if (wordList) {
                    // OCRで見つかった単語だけを抽出
                    const foundWords = wordList.filter(item => 
                        detectedText.includes(item.en.toLowerCase())
                    );

                    if (foundWords.length > 0) {
                        status.innerText = `✅ ${foundWords.length} 個の単語を特定しました`;
                        resultDiv.innerHTML = foundWords.map(w => `
                            <div class="word-card">
                                <span class="en">${w.en}</span>
                                <span class="ja">${w.ja}</span>
                            </div>
                        `).join('');
                    } else {
                        status.innerText = "QRは読めましたが、写真の中に登録済みの単語が見つかりません。";
                    }
                } else {
                    status.innerText = "未登録のURLです: " + url;
                }
            } catch (e) {
                status.innerText = "エラー: words.jsonが見つかりません。";
            }
        }
    </script>
</body>
</html>
