<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教科書スキャナーAI</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; color: #333; text-align: center; }
        .app { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .upload-btn { display: block; width: 100%; padding: 20px; background: #3498db; color: white; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 1.1rem; box-sizing: border-box; }
        #status { background: #f8f9fa; padding: 15px; border-radius: 10px; margin: 20px 0; border: 1px solid #ddd; }
        
        /* ボタン類 */
        .part-btn { background: #2c3e50; color: white; border: none; padding: 15px 25px; border-radius: 10px; cursor: pointer; margin: 5px; font-size: 1rem; width: 85%; }
        .back-btn { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
        
        /* 単語リスト */
        .word-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        .word-main { flex-grow: 1; }
        .en { font-weight: bold; color: #3498db; font-size: 1.1rem; display: block; }
        .ja { color: #555; font-size: 0.95rem; }
        .pos-badge { background: #e2e8f0; color: #4a5568; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; margin-right: 10px; min-width: 25px; text-align: center; font-weight: bold; border: 1px solid #cbd5e0; }
    </style>
</head>
<body>

<div class="app">
    <h1>教科書スキャナー</h1>
    <label class="upload-btn">
        📷 QRコードを撮影
        <input type="file" id="upload" accept="image/*" capture="environment" style="display:none">
    </label>
    
    <div id="status">QRコードを読み取ってください</div>
    <div id="select-area"></div>
    <div id="result"></div>
</div>

<script>
    const fileInput = document.getElementById('upload');
    const status = document.getElementById('status');
    const selectArea = document.getElementById('select-area');
    const resultDiv = document.getElementById('result');
    
    let currentUnitData = null; // 現在のQRに紐づく全Partデータ
    let lastUrl = ""; // 直前に読み込んだURL

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        status.innerText = "⌛ 読み取り中...";
        resetDisplay();

        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = async () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width; canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                const code = jsQR(imgData.data, imgData.width, imgData.height);
                
                // メモリ解放（自動で消す）
                if (img.src.startsWith('blob:')) URL.revokeObjectURL(img.src);

                if (code) {
                    lastUrl = code.data;
                    autoSelectUnit(code.data);
                } else {
                    status.innerText = "❌ QRコードが見つかりません。正面から撮ってください。";
                }
            };
            img.src = URL.createObjectURL(file);
        };
        reader.readAsDataURL(file);
    });

    // 画面表示をリセットする関数
    function resetDisplay() {
        selectArea.innerHTML = "";
        resultDiv.innerHTML = "";
    }

    async function autoSelectUnit(url) {
        try {
            const res = await fetch('words.json');
            const db = await res.json();
            currentUnitData = db[url];

            if (!currentUnitData) {
                status.innerHTML = `⚠️ 未登録のURLです<br><small style="word-break:break-all; font-size:0.6rem;">${url}</small>`;
                return;
            }

            const partNames = Object.keys(currentUnitData);

            if (partNames.length === 1) {
                // 項目が1つの場合も、一応戻れるように処理
                showWords(partNames[0]);
            } else {
                showPartButtons();
            }
        } catch (e) {
            status.innerText = "❌ データの読み込みに失敗しました。";
        }
    }

    // Part選択ボタンを表示する関数
    function showPartButtons() {
        resetDisplay();
        status.innerText = "表示するPartを選んでください";
        const partNames = Object.keys(currentUnitData);
        partNames.forEach(name => {
            const btn = document.createElement('button');
            btn.className = 'part-btn';
            btn.innerText = name;
            btn.onclick = () => showWords(name);
            selectArea.appendChild(btn);
        });
    }

    // 単語一覧を表示する関数
    function showWords(name) {
        const words = currentUnitData[name];
        status.innerHTML = `✅ <b>${name}</b> を表示中`;
        
        // 「戻る」ボタンを作成
        selectArea.innerHTML = `<button class="back-btn" onclick="showPartButtons()">← 他のPartを選ぶ</button>`;
        
        resultDiv.innerHTML = words.map(w => `
            <div class="word-item">
                <span class="pos-badge">${w.pos || '－'}</span>
                <div class="word-main">
                    <span class="en">${w.en}</span>
                    <span class="ja">${w.ja}</span>
                </div>
            </div>
        `).join('');
    }
</script>

</body>
</html>
